name: photo_recovery_pro
description: Professional photo and video recovery application with AI-powered scanning and military-grade file carving.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core Dependencies
  permission_handler: ^11.0.1
  image_gallery_saver: ^2.0.3
  path_provider: ^2.1.1
  tflite_flutter: ^0.10.4
  
  # Camera & Media
  camera: ^0.10.5
  video_player: ^2.7.2
  flutter_ffmpeg: ^0.4.2
  
  # Storage & Persistence
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI & Animation
  flutter_staggered_grid_view: ^0.7.0
  lottie: ^2.7.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.2.0
  
  # State Management
  provider: ^6.0.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/ai/
    - assets/images/
    - assets/animations/
    - assets/fonts/
  
  fonts:
    - family: GoogleSans
      fonts:
        - asset: assets/fonts/GoogleSans-Regular.ttf
        - asset: assets/fonts/GoogleSans-Bold.ttf
          weight: 700
